<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Temperatura Raspberry Pi</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

h1 {
    margin-bottom: 10px;
}

.filtros {
    margin: 20px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

table {
    border-collapse: collapse;
    width: 100%;
    max-width: 700px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    text-align: left;
}

th {
    background-color: #f0f0f0;
}

#error {
    color: red;
    margin-top: 10px;
}
</style>

</head>
<body>

<h1>Lecturas de temperatura (DS18B20)</h1>

<p>
Datos enviados automáticamente desde la Raspberry Pi y guardados en
<code>lectures.json</code>.
</p>

<div class="filtros">

    <label>Fecha:</label>
    <input type="date" id="filtroFecha">

    <label>Temp. mínima:</label>
    <input type="number" id="filtroMin" step="0.1">

    <label>Temp. máxima:</label>
    <input type="number" id="filtroMax" step="0.1">

    <button onclick="cargarDatos()">Filtrar</button>

    <button onclick="limpiarFiltros()">Limpiar filtros</button>

</div>

<button onclick="cargarDatos()">Actualizar datos</button>

<table id="tabla">
    <thead>
        <tr>
            <th>Fecha y hora</th>
            <th>Temperatura (°C)</th>
        </tr>
    </thead>

    <tbody>
    </tbody>
</table>

<div id="error"></div>

<script>

// URL del JSON
const URL_JSON = "data/lectures.json";

async function cargarDatos() {

    const tbody = document.querySelector("#tabla tbody");
    const errorDiv = document.getElementById("error");

    tbody.innerHTML = "";
    errorDiv.textContent = "";

    try {

        const res = await fetch(URL_JSON + "?t=" + Date.now());

        if (!res.ok) {
            throw new Error("Error HTTP " + res.status);
        }

        const datos = await res.json();

        if (!Array.isArray(datos) || datos.length === 0) {
            tbody.innerHTML =
                "<tr><td colspan='2'>No hay datos todavía.</td></tr>";
            return;
        }

        const filtroFecha =
            document.getElementById("filtroFecha").value;

        const filtroMin =
            document.getElementById("filtroMin").value;

        const filtroMax =
            document.getElementById("filtroMax").value;

        const datosFiltrados = datos.filter(registro => {

            const fechaRegistro =
                registro.timestamp
                ? registro.timestamp.split(" ")[0]
                : "";

            const temp =
                parseFloat(registro.temperature_c);

            if (filtroFecha && fechaRegistro !== filtroFecha) {
                return false;
            }

            if (filtroMin && temp < parseFloat(filtroMin)) {
                return false;
            }

            if (filtroMax && temp > parseFloat(filtroMax)) {
                return false;
            }

            return true;
        });

        if (datosFiltrados.length === 0) {
            tbody.innerHTML =
                "<tr><td colspan='2'>No se encontraron resultados.</td></tr>";
            return;
        }

        datosFiltrados.forEach(registro => {

            const tr = document.createElement("tr");

            const tdFecha = document.createElement("td");
            tdFecha.textContent = registro.timestamp || "";

            const tdTemp = document.createElement("td");
            tdTemp.textContent =
                registro.temperature_c + " °C";

            tr.appendChild(tdFecha);
            tr.appendChild(tdTemp);

            tbody.appendChild(tr);
        });

    } catch (e) {

        console.error(e);

        errorDiv.textContent =
            "No se han podido cargar los datos del JSON.";
    }
}

function limpiarFiltros() {

    document.getElementById("filtroFecha").value = "";
    document.getElementById("filtroMin").value = "";
    document.getElementById("filtroMax").value = "";

    cargarDatos();
}

// Cargar automáticamente al abrir la página
cargarDatos();

</script>

</body>
</html>
